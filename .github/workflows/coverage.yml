name: Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Add LLVM coverage tools
        run: rustup component add llvm-tools-preview

      - name: Install dependencies
        run: npm ci

      - name: Run frontend coverage
        run: npm run test:coverage

      - name: Run Rust coverage
        working-directory: src-tauri
        run: cargo llvm-cov --lcov --output-path ../coverage/rust.lcov

      - name: Combine coverage reports
        run: |
          cat coverage/lcov.info coverage/rust.lcov > coverage/combined.lcov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/combined.lcov
          format: lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error
